<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Mi Nube</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
            top: -200px; left: -200px;
        }
        body::after {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, transparent 70%);
            bottom: -200px; right: -200px;
        }
        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
        }
        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: #f9fafb;
        }
        .logo p {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; }
        .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 8px;
        }
        .input-wrap {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.5;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 12px;
            font-size: 14px;
            color: #f9fafb;
            outline: none;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus {
            border-color: #3b82f6;
            background: #1a2332;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .form-group input::placeholder { color: #4b5563; }
        .btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            margin-top: 8px;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(59,130,246,0.35);
        }
        .btn:active { transform: translateY(0); }
        .divider {
            text-align: center;
            margin: 24px 0;
            color: #374151;
            font-size: 12px;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #1f2937;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .register-link {
            text-align: center;
            font-size: 13px;
            color: #6b7280;
        }
        .register-link a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
        }
        .register-link a:hover { color: #93c5fd; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">☁️</div>
            <h1>Mi Nube</h1>
            <p>Inicia sesión en tu cuenta</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                {% if category == "error" %}
                    <div class="alert alert-error">⚠️ {{ message }}</div>
                {% endif %}
            {% endfor %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Correo electrónico</label>
                <div class="input-wrap">
                    <span class="input-icon">📧</span>
                    <input type="email" name="email" placeholder="tu@correo.com" required>
                </div>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="btn">Iniciar sesión</button>
        </form>

        <div class="divider">o</div>

        <div class="register-link">
            ¿No tienes cuenta? <a href="/register">Regístrate gratis</a>
        </div>
    </div>
</body>
</html>
